# American screenplay/stage layout
# These overrides are loaded on top of the canonical british-script.yaml.
# Only specifies values that differ; everything else inherits.

render:
  # Screenplay format expects transitions
  transitions: true

folio:
  # Courier Prime is the screenwriting standard
  font: Courier Prime
  # Standard US paper size
  page: us-letter
  # American convention uses inch margins
  margin: 1in

  title-page:
    title:
      # American: title in plain script font, not enlarged
      font-size: 12pt
      bold: false
      # Vertically centred, not third-down
      position: center
    subtitle:
      font-size: 12pt
      italic: false
    author:
      # Convention: "Written by" on its own line above name
      prefix: "Written by\n"
    date:
      # American clusters draft + date together, both bottom-right
      position: bottom-right

  positioning:
    speech:
      # American is tighter than British
      space-before: 1em
      speaker:
        # Centred above the dialogue column
        align: center
        # Plain caps, not bold small-caps
        bold: false
        case-transform: upper
        # No colon
        suffix: ""
      speech-instruction:
        # Parenthetical on its own line below speaker
        placement: new-line
        align: center
      dialogue:
        # Dialogue on its own line below cue/instruction
        placement: new-line
        # Standard WGA dialogue column
        indent: 2.5in
        wrap-indent: 2.5in
    stage-direction:
      # American action paragraphs are roman, not italic
      italic: false
    transition:
      # Transitions sit far right
      indent: 4in
    act-header:
      case-transform: upper
    scene-header:
      # American often centres scene headings for stage
      align: center
      case-transform: upper
